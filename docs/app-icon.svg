<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- LiftIQ app icon source. Regenerate the PNG with headless Chrome:
       wrap in an HTML page sized 1024x1024 (margin:0), then
       "Google Chrome" --headless=new --disable-gpu --force-device-scale-factor=1 \
         --window-size=1024,1024 --screenshot=AppIcon.png file://<page>.html
       Output goes to LiftIQ/LiftIQ/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png
       (1024x1024, no alpha). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6E9BFF"/>
      <stop offset="0.55" stop-color="#4375EC"/>
      <stop offset="1" stop-color="#2B49C7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#12245E" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>
  <g transform="translate(41 41) scale(0.92) rotate(-20 512 512)" filter="url(#shadow)" fill="#FFFFFF">
    <rect x="312" y="480" width="400" height="64" rx="32"/>
    <rect x="204" y="352" width="88" height="320" rx="42"/>
    <rect x="120" y="400" width="64" height="224" rx="32"/>
    <rect x="732" y="352" width="88" height="320" rx="42"/>
    <rect x="840" y="400" width="64" height="224" rx="32"/>
  </g>
  <g fill="#FFFFFF">
    <path d="M830 108 L850 158 L900 178 L850 198 L830 248 L810 198 L760 178 L810 158 Z" opacity="0.95"/>
    <path d="M928 276 L937 302 L963 311 L937 320 L928 346 L919 320 L893 311 L919 302 Z" opacity="0.8"/>
  </g>
</svg>
