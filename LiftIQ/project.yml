name: LiftIQ
options:
  bundleIdPrefix: com.adrianconley
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    version: 11.6.0
  swift-algorithms:
    url: https://github.com/apple/swift-algorithms.git
    version: 1.2.0

targets:
  LiftIQ:
    type: application
    platform: iOS
    sources:
      - path: LiftIQ
      - path: GoogleService-Info.plist
        buildPhase: resources
    entitlements:
      path: LiftIQ/LiftIQ.entitlements
      properties:
        com.apple.developer.healthkit: true
        # Release builds attest via App Attest (LiftIQAppCheckProviderFactory);
        # "production" is correct for TestFlight/App Store. Debug builds use
        # the App Check debug provider and ignore this.
        com.apple.developer.devicecheck.appattest-environment: production
    settings:
      base:
        # Only standard HTTPS/ATS encryption is used, which is export-exempt;
        # this pre-answers the App Store Connect compliance prompt per upload.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSHealthShareUsageDescription: "LiftIQ checks which workouts it has already saved to Apple Health."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "LiftIQ saves your completed workouts to Apple Health."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: 93G47TS4YJ
        # com.liftiq.app is registered to another Apple developer team, so it
        # can't carry capabilities (HealthKit) under this team's signing.
        PRODUCT_BUNDLE_IDENTIFIER: com.adrianconley.liftiq
        PRODUCT_NAME: LiftIQ
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    postBuildScripts:
      - script: '"${SRCROOT}/Scripts/release-checks.sh"'
        name: "Release Security Checks"
        basedOnDependencyAnalysis: false
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseFunctions
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: firebase-ios-sdk
        product: FirebaseAppCheck
      - package: swift-algorithms
        product: Algorithms

  LiftIQTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiftIQTests
    dependencies:
      - target: LiftIQ
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"

  LiftIQUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LiftIQUITests
    dependencies:
      - target: LiftIQ
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.9"
