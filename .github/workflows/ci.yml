name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  functions-test:
    name: Cloud Functions Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firebase/functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: firebase/functions/package-lock.json

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install firebase-tools
        run: npm install -g firebase-tools
        working-directory: .

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests against Firestore emulator
        working-directory: firebase
        run: firebase emulators:exec --only firestore --project liftiq-ci "cd functions && npm test"

  ios-test:
    name: iOS Tests
    runs-on: macos-15
    defaults:
      run:
        working-directory: LiftIQ
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
        working-directory: .

      - name: Install xcodegen
        run: brew install xcodegen
        working-directory: .

      - name: Stub GoogleService-Info.plist
        # The project references this as a bundled resource. Tests run in Debug
        # so release-checks.sh skips its placeholder validation.
        run: |
          cat > GoogleService-Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key><string>CI_STUB</string>
            <key>BUNDLE_ID</key><string>com.liftiq.app</string>
            <key>PROJECT_ID</key><string>liftiq-ci</string>
            <key>GCM_SENDER_ID</key><string>1</string>
            <key>GOOGLE_APP_ID</key><string>1:1:ios:1</string>
            <key>STORAGE_BUCKET</key><string>liftiq-ci.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><true/>
            <key>IS_SIGNIN_ENABLED</key><true/>
            <key>PLIST_VERSION</key><string>1</string>
          </dict>
          </plist>
          PLIST

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project LiftIQ.xcodeproj \
            -scheme LiftIQ \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            CODE_SIGNING_ALLOWED=NO \
            | tail -200
